stages:
  - test
  - build

.go-cache: &go-cache
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - .go/pkg/mod/
    policy: pull-push

test:unit:
  stage: test
  image: golang:1.24-alpine
  <<: *go-cache
  variables:
    GOPATH: ${CI_PROJECT_DIR}/.go
    CGO_ENABLED: "1"
  before_script:
    - for i in 1 2 3 4 5; do apk add --no-cache git ca-certificates build-base && break || echo "Attempt $i failed, retrying in 5s..." && sleep 5; done
    - mkdir -p .go
  script:
    - go mod tidy
    - go test -v -race -cover ./internal/...
  coverage: '/coverage: \d+\.\d+% of statements/'

lint:
  stage: test
  image: golang:1.24-alpine
  <<: *go-cache
  variables:
    GOPATH: ${CI_PROJECT_DIR}/.go
  before_script:
    - for i in 1 2 3 4 5; do apk add --no-cache git ca-certificates curl && break || echo "Attempt $i failed, retrying in 5s..." && sleep 5; done
    - mkdir -p .go
    - curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v2.0.2
    - go mod tidy
  script:
    - ${GOPATH}/bin/golangci-lint run --timeout 5m ./...
  allow_failure: true

build:relay:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  before_script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"${CI_REGISTRY}\":{\"auth\":\"$(printf "%s:%s" "${CI_REGISTRY_USER}" "${CI_REGISTRY_PASSWORD}" | base64 | tr -d '\n')\"}}}" > /kaniko/.docker/config.json
  script:
    - /kaniko/executor --context ${CI_PROJECT_DIR} --dockerfile ${CI_PROJECT_DIR}/Dockerfile --destination ${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHORT_SHA} --destination ${CI_REGISTRY_IMAGE}:latest

build:admin:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  before_script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"${CI_REGISTRY}\":{\"auth\":\"$(printf "%s:%s" "${CI_REGISTRY_USER}" "${CI_REGISTRY_PASSWORD}" | base64 | tr -d '\n')\"}}}" > /kaniko/.docker/config.json
  script:
    - /kaniko/executor --context ${CI_PROJECT_DIR} --dockerfile ${CI_PROJECT_DIR}/Dockerfile.admin --destination ${CI_REGISTRY_IMAGE}/admin:${CI_COMMIT_SHORT_SHA} --destination ${CI_REGISTRY_IMAGE}/admin:latest
