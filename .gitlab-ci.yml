stages:
  - test
  - build
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"

# Test stage
test:
  stage: test
  image: golang:1.24-alpine
  before_script:
    - apk add --no-cache git ca-certificates
  script:
    - go mod download
    - go test -v -cover ./...
  cache:
    paths:
      - /go/pkg/mod

# Build Docker image
build:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA .
    - docker tag $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA $CI_REGISTRY_IMAGE:latest
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA
    - docker push $CI_REGISTRY_IMAGE:latest
  only:
    - main
    - master

# Lint stage
lint:
  stage: test
  image: golang:1.24-alpine
  before_script:
    - apk add --no-cache git ca-certificates
    - go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
  script:
    - golangci-lint run ./...
  cache:
    paths:
      - /go/pkg/mod
  allow_failure: true

# Deploy to staging (manual trigger)
deploy_staging:
  stage: deploy
  image: bitnami/kubectl:latest
  script:
    - echo "Deploying to staging cluster..."
    - echo "TODO: Configure Atlas deployment via kubectl"
  environment:
    name: staging
  only:
    - main
    - master
  when: manual

# Deploy to production (manual trigger)
deploy_production:
  stage: deploy
  image: bitnami/kubectl:latest
  script:
    - echo "Deploying to production cluster..."
    - echo "TODO: Configure Atlas deployment via kubectl"
  environment:
    name: production
  only:
    - main
    - master
  when: manual
