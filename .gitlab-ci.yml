stages:
  - test
  - build
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"
  # Image name for the GitLab container registry
  IMAGE_NAME: ${CI_REGISTRY_IMAGE}
  # Kubernetes namespace
  K8S_NAMESPACE: coldforge-relay

# Cache Go modules across jobs
.go-cache: &go-cache
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - .go/pkg/mod/
    policy: pull-push

# =============================================================================
# TEST STAGE
# =============================================================================

# Run unit tests
test:unit:
  stage: test
  image: golang:1.24-alpine
  <<: *go-cache
  variables:
    GOPATH: ${CI_PROJECT_DIR}/.go
  before_script:
    - apk add --no-cache git ca-certificates
    - mkdir -p .go
  script:
    - go mod download
    - go test -v -race -cover ./internal/...
  coverage: '/coverage: \d+\.\d+% of statements/'

# Run linter (allow failure for now)
lint:
  stage: test
  image: golang:1.24-alpine
  <<: *go-cache
  variables:
    GOPATH: ${CI_PROJECT_DIR}/.go
  before_script:
    - apk add --no-cache git ca-certificates curl
    - mkdir -p .go
    - curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v1.62.2
  script:
    - ${GOPATH}/bin/golangci-lint run --timeout 5m ./...
  allow_failure: true

# =============================================================================
# BUILD STAGE
# =============================================================================

# Build and push Docker image
build:image:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_CERT_PATH: "/certs/client"
    DOCKER_TLS_VERIFY: 1
  before_script:
    - docker info
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    # Build the image
    - docker build
      --build-arg CI_COMMIT_SHA=${CI_COMMIT_SHA}
      --build-arg CI_COMMIT_REF_NAME=${CI_COMMIT_REF_NAME}
      -t ${IMAGE_NAME}:${CI_COMMIT_SHA}
      -t ${IMAGE_NAME}:${CI_COMMIT_REF_SLUG}
      .
    # Tag as latest for master/main branch
    - |
      if [ "$CI_COMMIT_REF_NAME" = "master" ] || [ "$CI_COMMIT_REF_NAME" = "main" ]; then
        docker tag ${IMAGE_NAME}:${CI_COMMIT_SHA} ${IMAGE_NAME}:latest
      fi
    # Push all tags
    - docker push ${IMAGE_NAME}:${CI_COMMIT_SHA}
    - docker push ${IMAGE_NAME}:${CI_COMMIT_REF_SLUG}
    - |
      if [ "$CI_COMMIT_REF_NAME" = "master" ] || [ "$CI_COMMIT_REF_NAME" = "main" ]; then
        docker push ${IMAGE_NAME}:latest
      fi
  rules:
    - if: $CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# Build for tags (semantic versioning)
build:release:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_CERT_PATH: "/certs/client"
    DOCKER_TLS_VERIFY: 1
  before_script:
    - docker info
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - docker build -t ${IMAGE_NAME}:${CI_COMMIT_TAG} .
    - docker push ${IMAGE_NAME}:${CI_COMMIT_TAG}
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

# =============================================================================
# DEPLOY STAGE
# =============================================================================

# Initial deployment (creates all resources)
deploy:initial:
  stage: deploy
  image:
    name: bitnami/kubectl:latest
    entrypoint: [""]
  variables:
    KUBECONFIG: /tmp/kubeconfig
  before_script:
    - echo "${KUBE_CONFIG}" | base64 -d > ${KUBECONFIG}
    - kubectl config get-contexts
  script:
    - echo "Initial deployment of coldforge-relay..."
    # Create namespace if it doesn't exist
    - kubectl create namespace ${K8S_NAMESPACE} --dry-run=client -o yaml | kubectl apply -f -
    # Apply all manifests (requires manifests to be in repo or use Helm/Kustomize)
    - |
      echo "Note: For initial deployment, run Atlas playbook manually:"
      echo "ansible-playbook playbooks/kube.yml -e 'manifest_names=[\"coldforge-relay\"]'"
    # Verify namespace exists
    - kubectl get namespace ${K8S_NAMESPACE}
  environment:
    name: production
    url: https://relay.coldforge.xyz
  rules:
    - if: $CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "main"
      when: manual
  needs:
    - build:image

# Deploy to Kubernetes (update existing deployment)
deploy:production:
  stage: deploy
  image:
    name: bitnami/kubectl:latest
    entrypoint: [""]
  variables:
    KUBECONFIG: /tmp/kubeconfig
  before_script:
    # Set up kubeconfig from CI/CD variable
    - echo "${KUBE_CONFIG}" | base64 -d > ${KUBECONFIG}
    - kubectl config get-contexts
  script:
    - echo "Deploying coldforge-relay to ${K8S_NAMESPACE}..."
    # Update the deployment image
    - kubectl set image deployment/coldforge-relay
      relay=${IMAGE_NAME}:${CI_COMMIT_SHA}
      -n ${K8S_NAMESPACE}
      --record
    # Wait for rollout
    - kubectl rollout status deployment/coldforge-relay -n ${K8S_NAMESPACE} --timeout=300s
    # Show deployment status
    - kubectl get pods -n ${K8S_NAMESPACE} -l app.kubernetes.io/name=coldforge-relay
  environment:
    name: production
    url: https://relay.coldforge.xyz
  rules:
    - if: $CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "main"
      when: manual
  needs:
    - build:image

# Rollback deployment (manual)
rollback:production:
  stage: deploy
  image:
    name: bitnami/kubectl:latest
    entrypoint: [""]
  variables:
    KUBECONFIG: /tmp/kubeconfig
  before_script:
    - echo "${KUBE_CONFIG}" | base64 -d > ${KUBECONFIG}
  script:
    - echo "Rolling back coldforge-relay deployment..."
    - kubectl rollout undo deployment/coldforge-relay -n ${K8S_NAMESPACE}
    - kubectl rollout status deployment/coldforge-relay -n ${K8S_NAMESPACE} --timeout=300s
  environment:
    name: production
    action: stop
  rules:
    - if: $CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "main"
      when: manual
  needs:
    - deploy:production
