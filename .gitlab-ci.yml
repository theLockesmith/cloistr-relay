stages:
  - test
  - build
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"
  # Image names for the container registry (registry.coldforge.xyz)
  IMAGE_NAME: registry.coldforge.xyz/coldforge/coldforge-relay
  ADMIN_IMAGE_NAME: registry.coldforge.xyz/coldforge/coldforge-relay-admin
  # Kubernetes namespace
  K8S_NAMESPACE: coldforge-relay

# Cache Go modules across jobs
.go-cache: &go-cache
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - .go/pkg/mod/
    policy: pull-push

# =============================================================================
# TEST STAGE
# =============================================================================

# Run unit tests
test:unit:
  stage: test
  image: golang:1.24-alpine
  <<: *go-cache
  variables:
    GOPATH: ${CI_PROJECT_DIR}/.go
    CGO_ENABLED: "1"
  before_script:
    - apk add --no-cache git ca-certificates build-base
    - mkdir -p .go
  script:
    - go mod tidy
    - go test -v -race -cover ./internal/...
  coverage: '/coverage: \d+\.\d+% of statements/'

# Run linter (allow failure for now)
lint:
  stage: test
  image: golang:1.24-alpine
  <<: *go-cache
  variables:
    GOPATH: ${CI_PROJECT_DIR}/.go
  before_script:
    - apk add --no-cache git ca-certificates curl
    - mkdir -p .go
    - curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v1.62.2
  script:
    - ${GOPATH}/bin/golangci-lint run --timeout 5m ./...
  allow_failure: true

# =============================================================================
# BUILD STAGE
# =============================================================================

# Build and push Docker image
build:image:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"registry.coldforge.xyz\":{\"auth\":\"$(printf '%s:%s' "${REGISTRY_USER}" "${REGISTRY_PASSWORD}" | base64 | tr -d '\n')\"}}}" > /kaniko/.docker/config.json
    - /kaniko/executor
      --context ${CI_PROJECT_DIR}
      --dockerfile ${CI_PROJECT_DIR}/Dockerfile
      --destination ${IMAGE_NAME}:${CI_COMMIT_SHA}
      --destination ${IMAGE_NAME}:${CI_COMMIT_REF_SLUG}
      --destination ${IMAGE_NAME}:latest
      --build-arg CI_COMMIT_SHA=${CI_COMMIT_SHA}
      --build-arg CI_COMMIT_REF_NAME=${CI_COMMIT_REF_NAME}
  rules:
    - if: $CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# Build and push admin UI Docker image
build:admin-image:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"registry.coldforge.xyz\":{\"auth\":\"$(printf '%s:%s' "${REGISTRY_USER}" "${REGISTRY_PASSWORD}" | base64 | tr -d '\n')\"}}}" > /kaniko/.docker/config.json
    - /kaniko/executor
      --context ${CI_PROJECT_DIR}
      --dockerfile ${CI_PROJECT_DIR}/Dockerfile.admin
      --destination ${ADMIN_IMAGE_NAME}:${CI_COMMIT_SHA}
      --destination ${ADMIN_IMAGE_NAME}:${CI_COMMIT_REF_SLUG}
      --destination ${ADMIN_IMAGE_NAME}:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# Build for tags (semantic versioning)
build:release:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"registry.coldforge.xyz\":{\"auth\":\"$(printf '%s:%s' "${REGISTRY_USER}" "${REGISTRY_PASSWORD}" | base64 | tr -d '\n')\"}}}" > /kaniko/.docker/config.json
    - /kaniko/executor
      --context ${CI_PROJECT_DIR}
      --dockerfile ${CI_PROJECT_DIR}/Dockerfile
      --destination ${IMAGE_NAME}:${CI_COMMIT_TAG}
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

# =============================================================================
# DEPLOY STAGE
# =============================================================================

# Initial deployment (creates all resources)
deploy:initial:
  stage: deploy
  image:
    name: bitnami/kubectl:latest
    entrypoint: [""]
  variables:
    KUBECONFIG: /tmp/kubeconfig
  before_script:
    - echo "${KUBE_CONFIG}" | base64 -d > ${KUBECONFIG}
    - kubectl config get-contexts
  script:
    - echo "Initial deployment of coldforge-relay..."
    # Create namespace if it doesn't exist
    - kubectl create namespace ${K8S_NAMESPACE} --dry-run=client -o yaml | kubectl apply -f -
    # Apply all manifests (requires manifests to be in repo or use Helm/Kustomize)
    - |
      echo "Note: For initial deployment, run Atlas playbook manually:"
      echo "ansible-playbook playbooks/kube.yml -e 'manifest_names=[\"coldforge-relay\"]'"
    # Verify namespace exists
    - kubectl get namespace ${K8S_NAMESPACE}
  environment:
    name: production
    url: https://relay.coldforge.xyz
  rules:
    - if: $CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "main"
      when: manual
  needs:
    - build:image

# Deploy to Kubernetes (update existing deployment)
deploy:production:
  stage: deploy
  image:
    name: bitnami/kubectl:latest
    entrypoint: [""]
  variables:
    KUBECONFIG: /tmp/kubeconfig
  before_script:
    # Set up kubeconfig from CI/CD variable
    - echo "${KUBE_CONFIG}" | base64 -d > ${KUBECONFIG}
    - kubectl config get-contexts
  script:
    - echo "Deploying coldforge-relay to ${K8S_NAMESPACE}..."
    # Update the deployment image
    - kubectl set image deployment/coldforge-relay
      relay=${IMAGE_NAME}:${CI_COMMIT_SHA}
      -n ${K8S_NAMESPACE}
      --record
    # Wait for rollout
    - kubectl rollout status deployment/coldforge-relay -n ${K8S_NAMESPACE} --timeout=300s
    # Show deployment status
    - kubectl get pods -n ${K8S_NAMESPACE} -l app.kubernetes.io/name=coldforge-relay
  environment:
    name: production
    url: https://relay.coldforge.xyz
  rules:
    - if: $CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "main"
      when: manual
  needs:
    - build:image

# Rollback deployment (manual)
rollback:production:
  stage: deploy
  image:
    name: bitnami/kubectl:latest
    entrypoint: [""]
  variables:
    KUBECONFIG: /tmp/kubeconfig
  before_script:
    - echo "${KUBE_CONFIG}" | base64 -d > ${KUBECONFIG}
  script:
    - echo "Rolling back coldforge-relay deployment..."
    - kubectl rollout undo deployment/coldforge-relay -n ${K8S_NAMESPACE}
    - kubectl rollout status deployment/coldforge-relay -n ${K8S_NAMESPACE} --timeout=300s
  environment:
    name: production
    action: stop
  rules:
    - if: $CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "main"
      when: manual
  needs:
    - deploy:production
