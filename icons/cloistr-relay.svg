<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background - original dark -->
  <rect width="64" height="64" rx="12" fill="#1E1E2E"/>

  <!-- Archway frame -->
  <g fill="none" stroke="#E5E7EB" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 14 52 L 14 24 A 18 18 0 0 1 50 24 L 50 52"/>
  </g>

  <!-- Relay symbol: broadcast/signal waves - smaller to fit within arch -->
  <g fill="none" stroke="#8B5CF6" stroke-width="2.5" stroke-linecap="round">
    <!-- Center dot -->
    <circle cx="32" cy="40" r="3" fill="#8B5CF6"/>
    <!-- Inner wave -->
    <path d="M 26 46 A 9 9 0 0 1 26 34"/>
    <path d="M 38 46 A 9 9 0 0 0 38 34"/>
    <!-- Outer wave -->
    <path d="M 22 48 A 14 14 0 0 1 22 32"/>
    <path d="M 42 48 A 14 14 0 0 0 42 32"/>
  </g>
</svg>
