services:
  postgres:
    image: postgres:15-alpine
    container_name: coldforge-relay-db
    environment:
      POSTGRES_DB: nostr
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5450:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly
    container_name: coldforge-relay-cache
    ports:
      - "6379:6379"
    volumes:
      - dragonfly_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  relay:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: coldforge-relay
    depends_on:
      postgres:
        condition: service_healthy
      dragonfly:
        condition: service_healthy
    environment:
      RELAY_PORT: 3334
      RELAY_NAME: "Cloistr Relay"
      RELAY_URL: "ws://localhost:3334"
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: nostr
      DB_USER: postgres
      DB_PASSWORD: postgres
      AUTH_POLICY: "auth-write"
      # Dragonfly cache
      CACHE_URL: "redis://dragonfly:6379"
      EVENT_CACHE_ENABLED: "true"
      WRITE_AHEAD_ENABLED: "true"
      SESSION_STORE_ENABLED: "true"
      RATE_LIMIT_DISTRIBUTED: "true"
    ports:
      - "3334:3334"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3334"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

volumes:
  postgres_data:
    driver: local
  dragonfly_data:
    driver: local
