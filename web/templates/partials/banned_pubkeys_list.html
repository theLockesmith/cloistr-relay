{{if not .Items}}
<div class="p-4 text-center text-gray-500">
    <p>No banned pubkeys</p>
</div>
{{else}}
<div class="overflow-x-auto">
    <table class="min-w-full">
        <thead class="bg-gray-750">
            <tr>
                <th class="px-4 py-3 text-left text-xs font-medium text-gray-400 uppercase tracking-wider">Pubkey</th>
                <th class="px-4 py-3 text-left text-xs font-medium text-gray-400 uppercase tracking-wider">Reason</th>
                <th class="px-4 py-3 text-left text-xs font-medium text-gray-400 uppercase tracking-wider">Banned At</th>
                <th class="px-4 py-3 text-right text-xs font-medium text-gray-400 uppercase tracking-wider">Action</th>
            </tr>
        </thead>
        <tbody class="divide-y divide-gray-700">
            {{range .Items}}
            <tr class="hover:bg-gray-750">
                <td class="px-4 py-3 whitespace-nowrap">
                    <code class="text-sm text-gray-300 bg-gray-700 px-2 py-1 rounded" title="{{.Pubkey}}">
                        {{truncatePubkey .Pubkey}}
                    </code>
                </td>
                <td class="px-4 py-3 text-sm text-gray-400">
                    {{if .Reason}}{{.Reason}}{{else}}<span class="text-gray-600">-</span>{{end}}
                </td>
                <td class="px-4 py-3 whitespace-nowrap text-sm text-gray-400">
                    {{formatTime .CreatedAt}}
                </td>
                <td class="px-4 py-3 whitespace-nowrap text-right">
                    <button onclick="unbanPubkey('{{.Pubkey}}')"
                            class="text-red-400 hover:text-red-300 text-sm font-medium">
                        Unban
                    </button>
                </td>
            </tr>
            {{end}}
        </tbody>
    </table>
</div>

{{if .HasMore}}
<div class="p-4 border-t border-gray-700">
    <button hx-get="/pubkeys/banned?limit={{.Limit}}&offset={{add .Offset .Limit}}"
            hx-target="#banned-pubkeys-list"
            hx-swap="innerHTML"
            class="w-full text-center text-sm text-nostr-purple hover:text-purple-400">
        Load more...
    </button>
</div>
{{end}}

<div class="px-4 py-2 bg-gray-750 text-xs text-gray-500">
    Showing {{len .Items}} of {{.TotalCount}} banned pubkeys
</div>
{{end}}

<script>
    async function unbanPubkey(pubkey) {
        if (!confirm('Unban this pubkey?')) return;

        const formData = new FormData();
        formData.append('pubkey', pubkey);

        try {
            await signedRequest('POST', '/pubkeys/unban', formData);
        } catch (err) {
            showToast('error', err.message);
        }
    }
</script>
