{{if not .Items}}
<div class="p-4 text-center text-gray-500">
    <p>No kind restrictions (all kinds allowed)</p>
</div>
{{else}}
<div class="p-4">
    <div class="flex flex-wrap gap-2">
        {{range .Items}}
        <div class="inline-flex items-center bg-gray-700 rounded-lg px-3 py-2">
            <span class="text-sm font-medium text-white mr-2">Kind {{.}}</span>
            <button onclick="disallowKind({{.}})"
                    class="text-red-400 hover:text-red-300 ml-2">
                <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
        </div>
        {{end}}
    </div>
</div>

<div class="px-4 py-2 bg-gray-750 text-xs text-gray-500 border-t border-gray-700">
    {{.TotalCount}} kind(s) in allowlist - only these kinds will be accepted
</div>
{{end}}

<script>
    async function disallowKind(kind) {
        if (!confirm('Remove kind ' + kind + ' from allowed list?')) return;

        const formData = new FormData();
        formData.append('kind', kind);

        try {
            await signedRequest('POST', '/admin/kinds/disallow', formData);
        } catch (err) {
            showToast('error', err.message);
        }
    }
</script>
