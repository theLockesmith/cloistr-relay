{{template "layout.html" .}}

{{define "content"}}
<div class="space-y-6">
    <div class="flex items-center justify-between">
        <h1 class="text-2xl font-bold text-white">Connection Stats</h1>
        <span class="text-sm text-gray-400">
            Last updated: {{if .Content}}{{formatTime .Content.LastUpdated}}{{end}}
        </span>
    </div>

    <!-- Stats Section (auto-refresh) -->
    <div id="stats-content" hx-get="/stats/refresh" hx-trigger="every 30s" hx-swap="innerHTML">
        {{template "stats_cards.html" .Content}}
    </div>
</div>
{{end}}
