{{template "layout.html" .}}

{{define "content"}}
<div class="space-y-6">
    <div class="flex items-center justify-between">
        <h1 class="text-2xl font-bold text-white">Moderation Queue</h1>
    </div>

    <div class="bg-gray-800 rounded-lg border border-gray-700">
        <div class="p-4 border-b border-gray-700">
            <h2 class="text-lg font-medium text-white flex items-center">
                <svg class="h-5 w-5 text-nostr-purple mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path>
                </svg>
                Events Pending Review
            </h2>
            <p class="mt-1 text-sm text-gray-400">Events flagged by automated systems or reported by users.</p>
        </div>

        <!-- Moderation Queue List -->
        <div id="moderation-queue"
             hx-get="/admin/moderation/queue"
             hx-trigger="load, refreshModerationQueue from:body"
             class="divide-y divide-gray-700">
            <div class="p-4 text-center text-gray-500">Loading...</div>
        </div>
    </div>
</div>
{{end}}
