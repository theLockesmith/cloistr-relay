{{template "layout.html" .}}

{{define "content"}}
<div class="space-y-6">
    <div class="flex items-center justify-between">
        <h1 class="text-2xl font-bold text-white">IP Management</h1>
    </div>

    <div class="bg-gray-800 rounded-lg border border-gray-700">
        <div class="p-4 border-b border-gray-700">
            <h2 class="text-lg font-medium text-white flex items-center">
                <svg class="h-5 w-5 text-yellow-400 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                </svg>
                Blocked IP Addresses
            </h2>
            <p class="mt-1 text-sm text-gray-400">Connections from these IPs will be rejected. Supports single IPs and CIDR notation.</p>
        </div>

        <!-- Block Form -->
        <div class="p-4 border-b border-gray-700 bg-gray-750">
            <form id="block-ip-form" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="md:col-span-1">
                    <label for="block-ip" class="block text-sm font-medium text-gray-300">IP Address or CIDR</label>
                    <input type="text" id="block-ip" name="ip" required
                           placeholder="192.168.1.1 or 10.0.0.0/8"
                           class="mt-1 block w-full rounded-md border-gray-600 bg-gray-700 text-white shadow-sm focus:border-nostr-purple focus:ring-nostr-purple sm:text-sm p-2">
                </div>
                <div class="md:col-span-1">
                    <label for="block-ip-reason" class="block text-sm font-medium text-gray-300">Reason (optional)</label>
                    <input type="text" id="block-ip-reason" name="reason"
                           placeholder="Reason for block"
                           class="mt-1 block w-full rounded-md border-gray-600 bg-gray-700 text-white shadow-sm focus:border-nostr-purple focus:ring-nostr-purple sm:text-sm p-2">
                </div>
                <div class="flex items-end">
                    <button type="submit"
                            class="w-full bg-yellow-600 hover:bg-yellow-700 text-white px-4 py-2 rounded-md text-sm font-medium transition-colors">
                        <span class="loading-spinner mr-2">
                            <svg class="animate-spin h-4 w-4 inline" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                        </span>
                        Block IP
                    </button>
                </div>
            </form>
        </div>

        <!-- Blocked IPs List -->
        <div id="blocked-ips-list"
             hx-get="/ips/blocked"
             hx-trigger="load, refreshBlockedIPs from:body"
             class="divide-y divide-gray-700">
            <div class="p-4 text-center text-gray-500">Loading...</div>
        </div>
    </div>
</div>

<script>
    // Block IP form
    document.getElementById('block-ip-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const form = e.target;
        const formData = new FormData(form);

        try {
            await signedRequest('POST', '/ips/block', formData);
            form.reset();
        } catch (err) {
            showToast('error', err.message);
        }
    });
</script>
{{end}}
