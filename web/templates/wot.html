{{template "layout.html" .}}

{{define "content"}}
<div class="space-y-6">
    <div class="flex items-center justify-between">
        <h1 class="text-2xl font-bold text-white">Web of Trust</h1>
        {{if .Content.Enabled}}
        <span class="inline-flex items-center rounded-full bg-green-500/10 px-3 py-1 text-sm font-medium text-green-400 ring-1 ring-inset ring-green-500/20">
            Active
        </span>
        {{else}}
        <span class="inline-flex items-center rounded-full bg-gray-500/10 px-3 py-1 text-sm font-medium text-gray-400 ring-1 ring-inset ring-gray-500/20">
            Not Configured
        </span>
        {{end}}
    </div>

    <!-- Stats Section (auto-refresh) -->
    <div id="wot-stats" hx-get="/wot/stats" hx-trigger="every 60s" hx-swap="innerHTML">
        {{template "wot_stats.html" .Content}}
    </div>

    <!-- Graph Visualization -->
    <div class="bg-gray-800 rounded-lg border border-gray-700 p-6">
        <div class="flex items-center justify-between mb-4">
            <h2 class="text-lg font-medium text-white">Trust Network Graph</h2>
            <div class="flex items-center space-x-4 text-xs">
                <span class="flex items-center"><span class="w-3 h-3 bg-yellow-400 rounded-full mr-1"></span> Owner (Level 0)</span>
                <span class="flex items-center"><span class="w-3 h-3 bg-green-400 rounded-full mr-1"></span> Followed (Level 1)</span>
                <span class="flex items-center"><span class="w-3 h-3 bg-blue-400 rounded-full mr-1"></span> Other (Level 2+)</span>
            </div>
        </div>
        <div id="wot-graph" class="w-full h-96 bg-gray-900 rounded-lg flex items-center justify-center">
            <p class="text-gray-500">Loading graph...</p>
        </div>
    </div>
</div>

<!-- D3.js for graph visualization -->
<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    fetch('/wot/graph')
        .then(r => r.json())
        .then(data => {
            if (!data.nodes || data.nodes.length === 0) {
                document.getElementById('wot-graph').innerHTML = '<p class="text-gray-500">No trust relationships found</p>';
                return;
            }
            renderGraph(data);
        })
        .catch(err => {
            document.getElementById('wot-graph').innerHTML = '<p class="text-red-400">Failed to load graph data</p>';
        });
});

function renderGraph(data) {
    const container = document.getElementById('wot-graph');
    container.innerHTML = '';

    const width = container.clientWidth;
    const height = container.clientHeight;

    const svg = d3.select('#wot-graph')
        .append('svg')
        .attr('width', width)
        .attr('height', height);

    // Color scale by trust level
    const color = d3.scaleOrdinal()
        .domain([0, 1, 2])
        .range(['#facc15', '#4ade80', '#60a5fa']); // yellow, green, blue

    // Create simulation
    const simulation = d3.forceSimulation(data.nodes)
        .force('link', d3.forceLink(data.links).id(d => d.id).distance(50))
        .force('charge', d3.forceManyBody().strength(-100))
        .force('center', d3.forceCenter(width / 2, height / 2))
        .force('collision', d3.forceCollide().radius(d => d.size + 5));

    // Draw links
    const link = svg.append('g')
        .selectAll('line')
        .data(data.links)
        .join('line')
        .attr('stroke', '#374151')
        .attr('stroke-opacity', 0.4)
        .attr('stroke-width', 1);

    // Draw nodes
    const node = svg.append('g')
        .selectAll('circle')
        .data(data.nodes)
        .join('circle')
        .attr('r', d => d.size)
        .attr('fill', d => color(d.trustLevel))
        .attr('stroke', '#1f2937')
        .attr('stroke-width', 2)
        .call(drag(simulation));

    // Add labels for larger nodes
    const label = svg.append('g')
        .selectAll('text')
        .data(data.nodes.filter(d => d.size >= 10))
        .join('text')
        .text(d => d.display)
        .attr('font-size', '10px')
        .attr('fill', '#9ca3af')
        .attr('text-anchor', 'middle')
        .attr('dy', d => d.size + 12);

    // Tooltip
    const tooltip = d3.select('body').append('div')
        .attr('class', 'fixed bg-gray-800 text-white text-xs px-2 py-1 rounded pointer-events-none opacity-0 z-50')
        .style('transition', 'opacity 0.2s');

    node.on('mouseover', function(event, d) {
        tooltip.html(d.display + '<br>Trust Level: ' + d.trustLevel)
            .style('left', (event.pageX + 10) + 'px')
            .style('top', (event.pageY - 10) + 'px')
            .style('opacity', 1);
    }).on('mouseout', function() {
        tooltip.style('opacity', 0);
    });

    // Update positions on tick
    simulation.on('tick', () => {
        link
            .attr('x1', d => d.source.x)
            .attr('y1', d => d.source.y)
            .attr('x2', d => d.target.x)
            .attr('y2', d => d.target.y);

        node
            .attr('cx', d => d.x = Math.max(d.size, Math.min(width - d.size, d.x)))
            .attr('cy', d => d.y = Math.max(d.size, Math.min(height - d.size, d.y)));

        label
            .attr('x', d => d.x)
            .attr('y', d => d.y);
    });

    // Drag behavior
    function drag(simulation) {
        function dragstarted(event) {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            event.subject.fx = event.subject.x;
            event.subject.fy = event.subject.y;
        }

        function dragged(event) {
            event.subject.fx = event.x;
            event.subject.fy = event.y;
        }

        function dragended(event) {
            if (!event.active) simulation.alphaTarget(0);
            event.subject.fx = null;
            event.subject.fy = null;
        }

        return d3.drag()
            .on('start', dragstarted)
            .on('drag', dragged)
            .on('end', dragended);
    }
}
</script>
{{end}}
