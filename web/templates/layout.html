<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} - Cloistr Relay Admin</title>

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <link rel="apple-touch-icon" href="/static/apple-touch-icon.png">

    <!-- htmx -->
    <script src="https://unpkg.com/htmx.org@2.0.0"></script>

    <!-- Alpine.js for dropdowns -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        nostr: {
                            purple: '#8B5CF6',
                            dark: '#1E1E2E',
                            darker: '#181825',
                        }
                    }
                }
            }
        }
    </script>

    <!-- nostr-tools for NIP-46 support -->
    <script type="module">
        // esm.sh handles bare imports for browser compatibility
        const [pure, nip46Module, pool, utils] = await Promise.all([
            import('https://esm.sh/nostr-tools@2.23.3'),
            import('https://esm.sh/nostr-tools@2.23.3/nip46'),
            import('https://esm.sh/nostr-tools@2.23.3/pool'),
            import('https://esm.sh/@noble/hashes@1.6.0/utils')
        ]);

        window.nostrTools = {
            generateSecretKey: pure.generateSecretKey,
            getPublicKey: pure.getPublicKey,
            hexToBytes: utils.hexToBytes,
            bytesToHex: utils.bytesToHex,
            BunkerSigner: nip46Module.BunkerSigner,
            parseBunkerInput: nip46Module.parseBunkerInput,
            SimplePool: pool.SimplePool,
            nip46: nip46Module
        };
        window.nostrToolsLoaded = true;
    </script>

    <!-- NIP-07/NIP-46 auth helper -->
    <script src="/static/js/nostr-auth.js"></script>

    <style>
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1E1E2E; }
        ::-webkit-scrollbar-thumb { background: #4B5563; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #6B7280; }

        /* Toast animations */
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes slideOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100%); opacity: 0; }
        }
        .toast-enter { animation: slideIn 0.3s ease-out; }
        .toast-exit { animation: slideOut 0.3s ease-in forwards; }

        /* htmx loading indicator */
        .htmx-request .loading-spinner { display: inline-block; }
        .loading-spinner { display: none; }
    </style>
</head>
<body class="h-full bg-gray-900 text-gray-100">
    <div class="min-h-full">
        <!-- Navigation -->
        <nav class="bg-gray-800 border-b border-gray-700">
            <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
                <div class="flex h-16 items-center justify-between">
                    <div class="flex items-center">
                        <div class="flex-shrink-0">
                            <span class="text-xl font-bold text-nostr-purple">Cloistr</span>
                            <span class="text-gray-400 ml-1">Relay Admin</span>
                        </div>
                        <div class="hidden md:block ml-10">
                            <div class="flex items-baseline space-x-1">
                                <!-- Core nav items -->
                                <a href="/"
                                   class="{{if eq .ActiveNav "dashboard"}}bg-gray-900 text-white{{else}}text-gray-300 hover:bg-gray-700 hover:text-white{{end}} rounded-md px-3 py-2 text-sm font-medium">
                                    Dashboard
                                </a>
                                <a href="/events"
                                   class="{{if eq .ActiveNav "events"}}bg-gray-900 text-white{{else}}text-gray-300 hover:bg-gray-700 hover:text-white{{end}} rounded-md px-3 py-2 text-sm font-medium">
                                    Events
                                </a>
                                <a href="/pubkeys"
                                   class="{{if eq .ActiveNav "pubkeys"}}bg-gray-900 text-white{{else}}text-gray-300 hover:bg-gray-700 hover:text-white{{end}} rounded-md px-3 py-2 text-sm font-medium">
                                    Pubkeys
                                </a>

                                <!-- Policy dropdown -->
                                <div class="relative" x-data="{ open: false }">
                                    <button @click="open = !open" @click.away="open = false"
                                            class="{{if or (eq .ActiveNav "moderation") (eq .ActiveNav "ips") (eq .ActiveNav "kinds") (eq .ActiveNav "wot")}}bg-gray-900 text-white{{else}}text-gray-300 hover:bg-gray-700 hover:text-white{{end}} rounded-md px-3 py-2 text-sm font-medium inline-flex items-center">
                                        Policy
                                        <svg class="ml-1 h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                                        </svg>
                                    </button>
                                    <div x-show="open" x-transition class="absolute left-0 mt-2 w-40 rounded-md bg-gray-700 shadow-lg ring-1 ring-black ring-opacity-5 z-50">
                                        <a href="/moderation" class="block px-4 py-2 text-sm text-gray-200 hover:bg-gray-600 rounded-t-md">Moderation</a>
                                        <a href="/ips" class="block px-4 py-2 text-sm text-gray-200 hover:bg-gray-600">IPs</a>
                                        <a href="/kinds" class="block px-4 py-2 text-sm text-gray-200 hover:bg-gray-600">Kinds</a>
                                        <a href="/wot" class="block px-4 py-2 text-sm text-gray-200 hover:bg-gray-600 rounded-b-md">WoT</a>
                                    </div>
                                </div>

                                <!-- Tools dropdown -->
                                <div class="relative" x-data="{ open: false }">
                                    <button @click="open = !open" @click.away="open = false"
                                            class="{{if or (eq .ActiveNav "haven") (eq .ActiveNav "browser") (eq .ActiveNav "stats")}}bg-gray-900 text-white{{else}}text-gray-300 hover:bg-gray-700 hover:text-white{{end}} rounded-md px-3 py-2 text-sm font-medium inline-flex items-center">
                                        Tools
                                        <svg class="ml-1 h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                                        </svg>
                                    </button>
                                    <div x-show="open" x-transition class="absolute left-0 mt-2 w-40 rounded-md bg-gray-700 shadow-lg ring-1 ring-black ring-opacity-5 z-50">
                                        <a href="/haven" class="block px-4 py-2 text-sm text-gray-200 hover:bg-gray-600 rounded-t-md">HAVEN</a>
                                        <a href="/browser" class="block px-4 py-2 text-sm text-gray-200 hover:bg-gray-600">Browser</a>
                                        <a href="/stats" class="block px-4 py-2 text-sm text-gray-200 hover:bg-gray-600 rounded-b-md">Stats</a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="hidden md:block">
                        <div id="auth-status" class="flex items-center space-x-3">
                            {{if .AdminPubkey}}
                            <!-- Settings gear -->
                            <a href="/settings" class="{{if eq .ActiveNav "settings"}}text-white{{else}}text-gray-400 hover:text-white{{end}} p-1" title="Settings">
                                <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                </svg>
                            </a>
                            <!-- Pubkey (shortened) -->
                            <span class="text-xs text-gray-500 font-mono" title="{{.AdminPubkey}}">{{.AdminPubkey}}</span>
                            <!-- Logout -->
                            <a href="/logout" onclick="sessionStorage.clear();"
                               class="bg-gray-700 hover:bg-gray-600 text-white px-3 py-1.5 rounded-md text-sm font-medium transition-colors">
                                Logout
                            </a>
                            {{else}}
                            <a href="/login"
                               class="bg-nostr-purple hover:bg-purple-600 text-white px-4 py-2 rounded-md text-sm font-medium transition-colors">
                                Login
                            </a>
                            {{end}}
                        </div>
                    </div>
                </div>
            </div>

            <!-- Mobile menu -->
            <div class="md:hidden border-t border-gray-700" id="mobile-menu">
                <div class="space-y-1 px-2 pb-3 pt-2">
                    <!-- Core -->
                    <a href="/" class="{{if eq .ActiveNav "dashboard"}}bg-gray-900 text-white{{else}}text-gray-300 hover:bg-gray-700{{end}} block rounded-md px-3 py-2 text-base font-medium">Dashboard</a>
                    <a href="/events" class="{{if eq .ActiveNav "events"}}bg-gray-900 text-white{{else}}text-gray-300 hover:bg-gray-700{{end}} block rounded-md px-3 py-2 text-base font-medium">Events</a>
                    <a href="/pubkeys" class="{{if eq .ActiveNav "pubkeys"}}bg-gray-900 text-white{{else}}text-gray-300 hover:bg-gray-700{{end}} block rounded-md px-3 py-2 text-base font-medium">Pubkeys</a>
                    <!-- Policy section -->
                    <div class="pt-2 pb-1 px-3 text-xs text-gray-500 uppercase tracking-wider">Policy</div>
                    <a href="/moderation" class="{{if eq .ActiveNav "moderation"}}bg-gray-900 text-white{{else}}text-gray-300 hover:bg-gray-700{{end}} block rounded-md px-3 py-2 text-base font-medium">Moderation</a>
                    <a href="/ips" class="{{if eq .ActiveNav "ips"}}bg-gray-900 text-white{{else}}text-gray-300 hover:bg-gray-700{{end}} block rounded-md px-3 py-2 text-base font-medium">IPs</a>
                    <a href="/kinds" class="{{if eq .ActiveNav "kinds"}}bg-gray-900 text-white{{else}}text-gray-300 hover:bg-gray-700{{end}} block rounded-md px-3 py-2 text-base font-medium">Kinds</a>
                    <a href="/wot" class="{{if eq .ActiveNav "wot"}}bg-gray-900 text-white{{else}}text-gray-300 hover:bg-gray-700{{end}} block rounded-md px-3 py-2 text-base font-medium">WoT</a>
                    <!-- Tools section -->
                    <div class="pt-2 pb-1 px-3 text-xs text-gray-500 uppercase tracking-wider">Tools</div>
                    <a href="/haven" class="{{if eq .ActiveNav "haven"}}bg-gray-900 text-white{{else}}text-gray-300 hover:bg-gray-700{{end}} block rounded-md px-3 py-2 text-base font-medium">HAVEN</a>
                    <a href="/browser" class="{{if eq .ActiveNav "browser"}}bg-gray-900 text-white{{else}}text-gray-300 hover:bg-gray-700{{end}} block rounded-md px-3 py-2 text-base font-medium">Browser</a>
                    <a href="/stats" class="{{if eq .ActiveNav "stats"}}bg-gray-900 text-white{{else}}text-gray-300 hover:bg-gray-700{{end}} block rounded-md px-3 py-2 text-base font-medium">Stats</a>
                    <!-- Settings -->
                    <div class="pt-2 pb-1 px-3 text-xs text-gray-500 uppercase tracking-wider">Config</div>
                    <a href="/settings" class="{{if eq .ActiveNav "settings"}}bg-gray-900 text-white{{else}}text-gray-300 hover:bg-gray-700{{end}} block rounded-md px-3 py-2 text-base font-medium">Settings</a>
                </div>
            </div>
        </nav>

        <!-- Main content -->
        <main class="mx-auto max-w-7xl py-6 px-4 sm:px-6 lg:px-8">
            {{template "content" .}}
        </main>
    </div>

    <!-- Toast container -->
    <div id="toast-container" class="fixed bottom-4 right-4 z-50 space-y-2"></div>

    <!-- Global htmx config -->
    <script>
        // htmx configuration
        htmx.config.defaultSwapStyle = 'innerHTML';
        htmx.config.includeIndicatorStyles = false;

        // Global error handling
        document.body.addEventListener('htmx:responseError', function(event) {
            // Redirect to login on 401 Unauthorized
            if (event.detail.xhr.status === 401) {
                sessionStorage.clear();
                window.location.href = '/login';
                return;
            }
            showToast('error', 'Request failed: ' + event.detail.xhr.status);
        });

        // Handle HX-Trigger headers for refreshing lists
        document.body.addEventListener('htmx:afterRequest', function(event) {
            const trigger = event.detail.xhr.getResponseHeader('HX-Trigger');
            if (trigger) {
                htmx.trigger(document.body, trigger);
            }
        });
    </script>
</body>
</html>
